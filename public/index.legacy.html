<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Lyrics Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="auth-container" class="hidden">
        <h1>Spotify Lyrics Overlay</h1>
        <p>Please authenticate to continue.</p>
        <a href="/auth/login" class="btn">Login with Spotify</a>
    </div>

    <div id="overlay-container" class="hidden">
        <div class="track-info glass-panel">
            <img id="album-art" src="" alt="Album Art">
            <div class="track-details">
                <div id="track-name">Track Name</div>
                <div id="artist-name">Artist Name</div>
            </div>
        </div>
        <div class="lyrics-container glass-panel">
            <div id="lyrics-content"></div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
